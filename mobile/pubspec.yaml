name: wine_tap_mobile
description: WineTap companion app — NFC scanning client.
publish_to: 'none'
version: 0.0.2+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  bonsoir: ^5.1.0
  nfc_manager: ^4.2.0
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  provider: ^6.0.0
  shared_preferences: ^2.0.0
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  sqlite3: ^3.2.0
  path_provider: ^2.1.0
  wakelock_plus: ^1.4.0
  package_info_plus: ^9.0.1
  share_plus: ^12.0.2
  file_picker: ^8.0.0

dev_dependencies:
  build_runner: ^2.4.0
  drift_dev: ^2.32.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
